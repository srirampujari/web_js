<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>
<style>
body{
    font-family: Arial;
    text-align:center;
}

.board{
    display:grid;
    grid-template-columns:repeat(3,100px);
    gap:5px;
    justify-content:center;
    margin-top:20px;
}

.cell{
    width:100px;
    height:100px;
    font-size:40px;
    display:flex;
    align-items:center;
    justify-content:center;
    border:2px solid black;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>Tic Tac Toe</h1>
<h2 id="status">Player X Turn</h2>

<div class="board">
<div class="cell" onclick="play(this,0)"></div>
<div class="cell" onclick="play(this,1)"></div>
<div class="cell" onclick="play(this,2)"></div>
<div class="cell" onclick="play(this,3)"></div>
<div class="cell" onclick="play(this,4)"></div>
<div class="cell" onclick="play(this,5)"></div>
<div class="cell" onclick="play(this,6)"></div>
<div class="cell" onclick="play(this,7)"></div>
<div class="cell" onclick="play(this,8)"></div>
</div>

<br>
<button onclick="restart()">Restart Game</button>

<script>

let board = ["","","","","","","","",""];
let currentPlayer = "X";

const winPatterns = [
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

function play(cell,index){

if(board[index] !== "") return;

board[index] = currentPlayer;
cell.innerText = currentPlayer;

if(checkWinner()){
document.getElementById("status").innerText = "Player " + currentPlayer + " Wins!";
return;
}

if(board.every(c => c !== "")){
document.getElementById("status").innerText = "Draw!";
return;
}

currentPlayer = currentPlayer === "X" ? "O" : "X";
document.getElementById("status").innerText = "Player " + currentPlayer + " Turn";
}

function checkWinner(){
return winPatterns.some(pattern => {
return pattern.every(i => board[i] === currentPlayer);
});
}

function restart(){
board = ["","","","","","","","",""];
currentPlayer = "X";
document.querySelectorAll(".cell").forEach(cell => cell.innerText = "");
document.getElementById("status").innerText = "Player X Turn";
}

</script>

</body>
</html>
